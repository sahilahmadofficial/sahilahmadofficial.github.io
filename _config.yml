# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Language
lang: en

# Timezone
timezone: Asia/Kolkata

# jekyll-seo-tag settings
title: Sahil Ahmad

tagline: "Cybersecurity · Identity Security · SailPoint ISC"

description: >-
  A cybersecurity student documenting my journey through
  Identity Security, SailPoint ISC, penetration testing,
  and everything in between. Honest. Technical. No fluff.

url: "https://sahilahmad-personal.github.io"

github:
  username: sahilahmad-personal

twitter:
  username: sahilahmad_dev

social:
  name: Sahil Ahmad
  email: sahil.ahmad.dev@gmail.com
  links:
    - https://github.com/sahilahmad-personal
    - https://twitter.com/sahilahmad_dev
    - https://www.linkedin.com/in/sahil-ahmad-dev
    - mailto:sahil.ahmad.dev@gmail.com

# Site Verification Settings
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# Web Analytics Settings
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Page views settings
pageviews:
  provider:

# Theme mode
theme_mode: dark

# CDN endpoint
cdn:

# Avatar
avatar: "/assets/img/avatar.jpg"

# Social preview image
social_preview_image:

# TOC
toc: true

# Comments
comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# Assets
assets:
  self_host:
    enabled:
    env:

# PWA
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

# Pagination
paginate: 10

# Base URL
baseurl: ""

# ------------ Do not modify below ------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/