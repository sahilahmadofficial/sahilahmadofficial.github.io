<style>
  footer {
    border-top: 1px solid var(--border-color, #2d2d2d);
    padding: 1.2rem 1.5rem;

    color: var(--text-muted-color, #888);
  }

  .footer-wrap {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .footer-left,
  .footer-center,
  .footer-right {
    flex: 1;
    min-width: 160px;
  }

  .footer-left {
    text-align: left;
  }

  .footer-center {
    text-align: center;
  }

  .footer-right {
    text-align: right;
  }

  footer a {
    color: var(--link-color, #6ab0f5);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  footer a:hover {
    color: var(--link-underline-color, #89c4f4);
    text-decoration: underline;
  }

  footer p {
    margin: 0;
  }

  .footer-name {
    font-weight: 600;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .footer-wrap {
      flex-direction: column;
      text-align: center;

    }

    .footer-center,
    .footer-right {

    }
